version: '3.8'

services:
  # React frontend service
  masala-frontend:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for development (optional, remove for production)
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true  # Required for file watching in Docker
      - NODE_ENV=development
    restart: unless-stopped
    stdin_open: true
    tty: true